<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        :root {
            --bg: #0b1220;
            --panel: rgba(30, 41, 59, 0.65);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-hover: #16a34a;
            --border: rgba(148, 163, 184, 0.15);

            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #3b82f6;
            --info: #64748b;
            --safe: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px 16px;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI;
            background: radial-gradient(circle at top, #111827, #0b1220);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 920px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.6rem;
            margin: 0;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .header p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        /* PANEL */
        .panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            color: var(--text);
            outline: none;
            font-family: monospace;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            transition: 0.2s;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-copy {
            margin-bottom: 12px;
            background: var(--low);
        }

        .btn-copy:hover {
            background: #2563eb;
        }

        /* SUMMARY */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .summary-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
        }

        .summary-box span {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .summary-box strong {
            display: block;
            margin-top: 4px;
            font-size: 1.1rem;
            color: var(--accent);
        }

        /* FINDINGS */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .card-title {
            font-weight: 700;
        }

        .card-body {
            padding: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        /* BADGES */
        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .critical { background: rgba(239,68,68,0.15); color: var(--critical); }
        .high { background: rgba(249,115,22,0.15); color: var(--high); }
        .medium { background: rgba(234,179,8,0.15); color: var(--medium); }
        .low { background: rgba(59,130,246,0.15); color: var(--low); }
        .info { color: var(--muted); }
        .safe { background: rgba(34,197,94,0.15); color: var(--safe); }

        /* LOADER */
        .loader {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>AI-powered vulnerability scanner</h1>
    </div>

    <div class="panel">

        <label>Target URL</label>
        <input id="targetUrl" value="http://localhost:3000">

        <label style="margin-top:12px;">AI Prompt</label>
        <textarea id="aiPrompt" rows="2" placeholder="e.g. Check headers and cookies..."></textarea>

        <button class="btn" id="scanBtn" onclick="startScan()">
            <div class="loader" id="spinner"></div>
            <span id="btnText">Start Scan</span>
        </button>

    </div>

    <div id="results-container" style="display:none;">

        <div class="summary">
            <div class="summary-box">
                <span>Target</span>
                <strong id="sum-target">-</strong>
            </div>

            <div class="summary-box">
                <span>Duration</span>
                <strong id="sum-time">-</strong>
            </div>

            <div class="summary-box">
                <span>Scanners</span>
                <strong id="sum-scanners">-</strong>
            </div>
        </div>

        <button class="btn btn-copy" id="copyBtn" onclick="copyResults()">
            Copy Report
        </button>

        <div id="findings-list"></div>

    </div>

</div>

<script>
let lastScanData = null;
let lastPromptUsed = "";

function badge(sev, status) {
    if(status === "Güvenli") return "safe";
    return sev?.toLowerCase() || "info";
}

async function startScan() {
    const target = document.getElementById("targetUrl").value;
    const prompt = document.getElementById("aiPrompt").value;

    const btn = document.getElementById("scanBtn");
    const spinner = document.getElementById("spinner");
    const text = document.getElementById("btnText");

    if(!target) return alert("Enter URL!");

    lastPromptUsed = prompt;

    btn.disabled = true;
    spinner.style.display = "block";
    text.innerText = "Scanning...";

    document.getElementById("results-container").style.display = "none";
    document.getElementById("findings-list").innerHTML = "";

    try {
        const res = await fetch("http://127.0.0.1:8000/api/scan", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({target, prompt})
        });

        const data = await res.json();
        lastScanData = data;

        document.getElementById("sum-target").innerText = data.target;
        document.getElementById("sum-time").innerText = data.duration_seconds + "s";
        document.getElementById("sum-scanners").innerText = data.ai_detected_scanners.join(", ");

        const list = document.getElementById("findings-list");

        if(data.findings?.length) {
            data.findings.forEach(f => {

                const div = document.createElement("div");
                div.className = "card";

                const cls = badge(f.severity, f.status);

                div.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${f.scanner}</div>
                        <div class="badge ${cls}">${f.status}</div>
                    </div>
                    <div class="card-body">
                        <b>Detail:</b> ${f.detail || "-"}
                    </div>
                `;

                list.appendChild(div);
            });
        } else {
            list.innerHTML = "<p style='color:#94a3b8;text-align:center'>No findings</p>";
        }

        document.getElementById("results-container").style.display = "block";

    } catch(e) {
        alert("Backend not running!");
    } finally {
        btn.disabled = false;
        spinner.style.display = "none";
        text.innerText = "Start Scan";
    }
}

function copyResults() {
    if(!lastScanData) return;

    let txt = `SAFE SCAN REPORT\n\n`;
    txt += `Target: ${lastScanData.target}\n`;
    txt += `Prompt: ${lastPromptUsed}\n\n`;

    lastScanData.findings.forEach(f => {
        txt += `[${f.scanner}]\n${f.status}\n${f.detail}\n\n`;
    });

    navigator.clipboard.writeText(txt).then(() => {
        alert("Copied!");
    });
}
</script>

</body>
</html>
